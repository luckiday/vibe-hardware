# protocol.yaml — pager-buddy Mac↔device status protocol  (CONTRACT · v1)
#
# producer: the Mac bridge   (Level-0: bridge/claude_pager_hook.py; Level-1: a menubar app)
# consumer: the firmware ui_status component  (and the design/ web mock)
#
# The SINGLE SOURCE OF TRUTH for the wire format that carries Claude Code session
# status from the Mac to the pager. The `session` object below is intentionally
# IDENTICAL to the design mock's session shape (examples/pager-buddy/design/data.js)
# so the firmware can render a received snapshot directly — no translation layer.
# Referenced from product.yaml `interfaces.pager_status`. Bump `version` on any
# breaking change to the wire format.

protocol: pager-buddy/status
version: 1

# ── transport ─────────────────────────────────────────────────────────────────
# Two legs, both carrying the SAME `snapshot` JSON below:
#   1. hook → hub   (HTTP, loopback on the Mac): each Claude hook POSTs a full
#      snapshot to the hub (pager_stub.py); the web mock GETs it. Internal to the Mac.
#   2. hub → device (BLE): the real pager link. The device is a NimBLE *peripheral*
#      (GATT server); the Mac is the *central* and WRITES snapshots to it. The
#      device is a dumb renderer — it shows the latest snapshot, no merge logic.
# bridge/ble_push.py is leg 2: it polls the hub (leg 1) and relays over BLE.
transport:
  # ── leg 1: hook → hub (HTTP, Mac-local) ──────────────────────────────────────
  http:
    push:
      method: POST
      path: /v1/snapshot
      content_type: application/json
      body: snapshot                 # the Snapshot object below
      response: '{"ok": true}'
    poll:
      method: GET
      path: /v1/snapshot
      returns: snapshot
    settings:                        # device audio settings (the CLI ↔ hub leg)
      get:  { method: GET,  path: /v1/settings, returns: settings }
      post: { method: POST, path: /v1/settings, body: settings, response: settings }

  # ── leg 2: hub → device (BLE GATT — the pager link, implemented) ──────────────
  # 128-bit UUIDs; the canonical strings differ only in the last byte (role).
  # Must match firmware/components/bridge/bridge.c and bridge/ble_push.py.
  ble:
    device_name: "pg-XXXX"           # last two MAC bytes; advertised in the scan response
    service:    "00010000-7265-6761-702d-796464756200"
    snapshot:                        # WRITE, Mac → device
      uuid: "00010000-7265-6761-702d-796464756201"
      # A snapshot is larger than one BLE write, so it is framed into chunks:
      #   each write = [ver(1)=1, flags(1)] + payload
      #   flags bit0 = START (first chunk; resets the device buffer)
      #         bit1 = END   (last chunk; device parses + applies)
      # chunk payload size = negotiated_MTU − 3 (ATT) − 2 (this header)
      framing: "[ver=1, flags] + chunk;  flags: 0x01=START 0x02=END"
    resolution:                      # NOTIFY, device → Mac (Level-1, reserved)
      uuid: "00010000-7265-6761-702d-796464756202"
      body: '{ session_id: string, action: string }'   # action: allow | deny | <option label>
    control:                         # WRITE, Mac → device (audio settings; additive — no version bump)
      uuid: "00010000-7265-6761-702d-796464756203"
      body: '{ audio: 0|1, vol: 0..100 }'      # abbreviated keys to fit a small write
      framing: "[ver=1, flags] + chunk;  flags: 0x01=START 0x02=END"   # same as snapshot

# ── Snapshot — the top-level message ────────────────────────────────────────────
# A complete picture of all live sessions. The device renders whatever it last
# received.
snapshot:
  v:        int            # protocol version (== version)
  type:     string         # always "snapshot" in Level-0
  ts:       number         # unix epoch seconds, when the Mac built it
  clock:    string         # "HH:MM" — the Mac is the time source (device may lack RTC/NTP)
  date:     string         # e.g. "Fri Jun 19"
  sessions: "[Session]"    # most-recently-updated first
  # NOTE: `battery` is NOT on the wire — it is device-owned; the firmware fills
  # its own battery %. The design mock carries `battery` only because it fakes a device.

# ── Session ─────────────────────────────────────────────────────────────────
# One coding-agent session. Field names MATCH design/data.js exactly.
session:
  id:       string         # stable session id (Claude session_id)
  name:     string         # short workspace name (cwd basename, prettified)
  agent:    string         # "Claude" (Codex / Gemini / … later)
  term:     string         # terminal/IDE app, e.g. "iTerm" / "VS Code"; "—" if unknown
  age:      string         # humanized time since LAST update (renderers re-age from `ts`)
  ts:       number         # epoch seconds of LAST update — see `freshness` below
  state:    string         # see `states` below
  task:     string         # the session's title: the user's ask, summarized to one clean line
  activity: "[Activity]"   # recent tool steps (most recent last); shown when working
  approve:  "Approve?"     # present iff state == "waiting"
  ask:      "Ask?"         # present iff state == "asking"
  done:     "Done?"        # present iff state == "done"

# ── state enum — drives dot color + which screen opens ──────────────────────────
# Matches design/data.js + app.js (STATE_LABEL). The device never shows code/diffs.
states:
  working: "agent is running                  (dot: blue)"
  waiting: "needs you — approve a permission   (dot: amber)  → requires `approve`"
  asking:  "agent asked a question            (dot: cyan)   → requires `ask`"
  done:    "turn finished                     (dot: green)  → requires `done`"
  error:   "tool / turn failed                (dot: red)"

activity:                  # one tool step
  tool:   string           # "Edit", "Bash", "Read", "Analyzing", …
  detail: string           # file path / command / short text
  sub:    "string?"        # optional second line ("Running…", "+6 -2", …)

approve:                   # the permission decision — STATUS ONLY, never code/diff
  tool: string             # tool awaiting approval
  file: string             # affected path (or command)
  add:  "int?"             # added lines   (optional; omit if unknown)
  del:  "int?"             # removed lines (optional)

ask:
  q:    string             # the question
  opts: "[string]"         # selectable options

done:
  summary: string          # one-line result
  files:   "int?"          # files touched (optional)
  tests:   "string?"       # e.g. "8 passed" (optional)

# ── Settings — device AUDIO config (NOT status) ─────────────────────────────────
# Mac-owned knobs for the pager's alert audio, carried on the `control` BLE
# characteristic (and the /v1/settings HTTP leg). The hub holds them, the CLI
# (bridge/pager_settings.py) edits them, ble_push.py relays them to the device, which
# also persists them in NVS so the first alert after a cold boot honors the last
# choice. Kept SEPARATE from `snapshot` on purpose: status streams device-ward
# continuously; settings change rarely and only on user action.
#
# Alert *triggering* is DEVICE-owned: the firmware decides WHEN to beep from the
# snapshots it already receives — it tones when a session newly enters waiting /
# asking / done, a DISTINCT pattern per state (waiting = urgent double-beep, asking =
# single mid tone, done = soft descending tone). The wire below carries only WHETHER
# audio is on and HOW LOUD — never the trigger.
settings:
  audio_enabled: bool      # master enable for alert tones (default true)
  volume:        int       # 0..100, codec output volume (default 60)
  # On the `control` characteristic the keys are abbreviated: { "audio": 0|1, "vol": 0..100 }

# ── freshness — sessions expire by INACTIVITY, not by SessionEnd ─────────────────
# SessionEnd is unreliable (a closed / crashed / merely-idle CLI often never fires
# it), and the Mac only pushes on a hook event — so a renderer must NOT treat the
# last snapshot as permanent. Each session carries `ts` (epoch of its last update).
# Every renderer (device, stub, web UI) should, on its own clock:
#   - recompute `age` from `ts`, and
#   - HIDE / drop any session where (now - ts) > idle_ttl_seconds
# so closed/idle sessions fall off even with no new push. The Mac applies the same
# TTL when it builds a snapshot (PAGER_BUDDY_IDLE_TTL). Long-running tools can be
# quiet a while, so keep the TTL generous.
#
# CLOCK SOURCE — the device has no RTC/NTP, so its ONLY time source is this protocol.
# The device anchors "now" on the snapshot's top-level `ts` plus a monotonic timer
# (now ≈ ts + elapsed_since_receipt) and derives its local clock from `ts` vs `clock`.
# Therefore the hub (pager_stub.py) RE-STAMPS top-level `ts`/`clock`/`date` to serve
# time on every GET — a re-served snapshot must carry current time, not the stale
# hook-build time, or the device clock drifts backward. The BLE relay (ble_push.py)
# only forwards on a MEANINGFUL change (it ignores the volatile `ts`/`clock`/`date`
# + per-session `age`), and the device re-ages/prunes/ticks locally between pushes.
freshness:
  idle_ttl_seconds: 600    # default; renderer + Mac both honor it (override via env / ?idle=)

# ── Claude Code hook → state mapping (how the bridge fills the above) ────────────
# Level-0 registers these hook events (bridge/install_hooks.py). Mapping is
# best-effort; Level-1 (a stateful menubar app) will refine approve/ask detection
# and add the two-way `resolution` path.
event_mapping:
  SessionStart:       "upsert session, state=working"
  UserPromptSubmit:   "state=working, task=prompt"
  PreToolUse:         "state=working, push activity{tool,detail}; tool==AskUserQuestion → asking + ask"
  PermissionRequest:  "tool==AskUserQuestion → asking; else state=waiting + approve{tool,file}"
  Notification:       "best-effort nudge → task=message (Level-1 refines)"
  Stop:               "state=done, done.summary = last_assistant_message"
  StopFailure:        "state=error"
  PostToolUseFailure: "state=error"
  SessionEnd:         "remove session"

# ── example snapshot ────────────────────────────────────────────────────────────
example:
  v: 1
  type: snapshot
  ts: 1750000000
  clock: "10:20"
  date: "Fri Jun 19"
  sessions:
    - id: "abc123"
      name: "fix auth bug"
      agent: "Claude"
      term: "iTerm"
      age: "27m"
      ts: 1749998380
      state: "waiting"
      task: "fix the auth bug in middleware"
      activity:
        - { tool: "Edit", detail: "src/auth/middleware.ts", sub: "Running…" }
      approve: { tool: "Edit", file: "src/auth/middleware.ts" }
