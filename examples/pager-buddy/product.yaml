# product.yaml — pager-buddy product manifest
#
# The vibe-plm single source of truth: product identity, the per-domain status,
# and the INTERFACE CONTRACTS the three domains must agree on. Validate with:
#   python3 ../../skills/vibe-plm/scripts/plm_check.py product.yaml
#
# Bump `revision` on ANY cross-domain change (a pin move, an outline change, a
# shared fit-number change). vibe-plm owns this file; each domain owns its own dir.

product: pager-buddy
revision: v2026-06-19            # vYYYY-MM-DD — bump on any cross-domain change
summary: "A desk pager for Claude Code: lights / glyph / buzz on session-state changes."

# --- the three domains (each is a self-contained vibe-* project) ---
firmware:                        # vibe-firmware
  dir: firmware/
  status: stub                   # stub | wip | clean | released
  toolchain: TBD                 # e.g. esp-idf (pinned image tag) / platformio
pcb:                             # vibe-pcb
  dir: pcb/
  status: stub
  gate: "ERC/DRC 0 errors / 0 unconnected + belly keep-out"
cad:                             # vibe-cad
  dir: cad/
  status: stub
  gate: "fit-check 0 mm^3 board<->shell interference"

# --- interface contracts: the files TWO domains must agree on ---
# vibe-plm (plm_check.py) checks each path resolves. SOURCE contracts
# (.yaml/.json/.md) MUST exist; generated artifacts (.step/.glb/.stl) are
# warned-not-failed until produced. Direction below is producer -> consumer.
interfaces:
  pinmap: pcb/pinmap.yaml                       # pcb  -> firmware  (the net map: pin <-> signal)
  board_step: pcb/board.step                    # pcb  -> cad       (board 3D for the fit-check; generated)
  enclosure_constraints: cad/constraints.yaml   # cad <-> pcb       (the shared fit numbers)
